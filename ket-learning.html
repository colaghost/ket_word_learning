<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KET 单词学习 - 多啦A梦版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #E6F7FF 0%, #B8E4FF 100%);
            min-height: 100vh;
            color: #006699;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, #0099CC 0%, #0077AA 100%);
            border-radius: 0 0 30px 30px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 153, 204, 0.3);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .doraemon-face {
            width: 80px;
            height: 80px;
            background: #0099CC;
            border-radius: 50%;
            margin: 0 auto 15px;
            position: relative;
            border: 3px solid #fff;
        }

        .doraemon-face::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 35px;
            background: white;
            border-radius: 50%;
        }

        .doraemon-face::after {
            content: '';
            position: absolute;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background: #FF6B6B;
            border-radius: 50%;
            border: 2px solid #fff;
        }

        .title {
            text-align: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-icon {
            font-size: 24px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #0099CC;
        }

        /* Check-in Button */
        .checkin-container {
            text-align: center;
            margin: 20px 0;
        }

        .checkin-btn {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8888 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .checkin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.5);
        }

        .checkin-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Unit Cards */
        .units-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .unit-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 153, 204, 0.15);
            transition: all 0.3s ease;
            border: 3px solid #0099CC;
        }

        .unit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 153, 204, 0.25);
        }

        .unit-title {
            font-size: 20px;
            font-weight: bold;
            color: #0099CC;
            margin-bottom: 15px;
            text-align: center;
        }

        .unit-buttons {
            display: flex;
            gap: 10px;
        }

        .unit-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .pretest-btn {
            background: #FFD700;
            color: #333;
        }

        .wordlist-btn {
            background: #98D8AA;
            color: #333;
        }

        .unit-btn:hover {
            transform: scale(1.05);
        }

        /* Level Selection */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .level-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .level-card.locked {
            opacity: 0.5;
        }

        .level-card.unlocked {
            border: 3px solid #FFD700;
        }

        .level-card.completed {
            border: 3px solid #98D8AA;
        }

        .level-number {
            font-size: 24px;
            font-weight: bold;
            color: #0099CC;
            margin-bottom: 10px;
        }

        .level-status {
            font-size: 14px;
            margin-bottom: 15px;
        }

        .level-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .level-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .study-btn {
            background: #0099CC;
            color: white;
        }

        .quiz-btn {
            background: #FF6B6B;
            color: white;
        }

        .level-btn:hover {
            transform: scale(1.05);
        }

        /* Back Button */
        .back-btn {
            background: #fff;
            border: 2px solid #0099CC;
            color: #0099CC;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #0099CC;
            color: white;
        }

        /* Study Mode */
        .word-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 8px 30px rgba(0, 153, 204, 0.2);
        }

        .word-text {
            font-size: 48px;
            font-weight: bold;
            color: #0099CC;
            text-align: center;
            margin-bottom: 15px;
        }

        .pronounce-btn {
            display: block;
            margin: 10px auto;
            background: #FFD700;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .pronounce-btn:hover {
            transform: scale(1.05);
        }

        .word-details {
            text-align: center;
            margin: 20px 0;
        }

        .word-pos, .word-phonetic {
            font-size: 20px;
            color: #666;
            margin-bottom: 10px;
        }

        .word-meaning {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .word-example {
            font-size: 18px;
            color: #666;
            background: #E6F7FF;
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
        }

        .navigation {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .prev-btn, .next-btn {
            background: #0099CC;
            color: white;
        }

        .prev-btn:hover, .next-btn:hover {
            transform: scale(1.05);
        }

        .progress {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #0099CC;
            margin-bottom: 15px;
        }

        /* Quiz Mode */
        .quiz-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 700px;
            margin: 0 auto;
            box-shadow: 0 8px 30px rgba(0, 153, 204, 0.2);
        }

        .quiz-question {
            font-size: 28px;
            font-weight: bold;
            color: #0099CC;
            text-align: center;
            margin-bottom: 30px;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .quiz-option {
            background: #E6F7FF;
            border: 3px solid #0099CC;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quiz-option:hover {
            background: #0099CC;
            color: white;
            transform: scale(1.02);
        }

        .quiz-option.correct {
            background: #98D8AA;
            border-color: #4CAF50;
        }

        .quiz-option.wrong {
            background: #FF6B6B;
            border-color: #f44336;
        }

        .quiz-progress {
            text-align: center;
            font-size: 20px;
            color: #666;
            margin-bottom: 20px;
        }

        .feedback {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 18px;
        }

        .feedback.correct {
            background: #98D8AA;
            color: #155724;
        }

        .feedback.wrong {
            background: #FF6B6B;
            color: #721c24;
        }

        /* Completion Screen */
        .completion-screen {
            text-align: center;
            padding: 40px;
        }

        .completion-title {
            font-size: 36px;
            font-weight: bold;
            color: #0099CC;
            margin-bottom: 20px;
        }

        .completion-stars {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .completion-message {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
        }

        .completion-btn {
            background: #FFD700;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .completion-btn:hover {
            transform: scale(1.05);
        }

        /* Fireworks Animation */
        @keyframes firework {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 0;
            }
        }

        .firework {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: firework 1s ease-out forwards;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0099CC;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                top: -50px;
                opacity: 0;
            }
            to {
                top: 20px;
                opacity: 1;
            }
        }

        /* Hidden class */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-bar {
                gap: 15px;
            }

            .stat-item {
                padding: 8px 15px;
            }

            .unit-buttons {
                flex-direction: column;
            }

            .units-grid {
                grid-template-columns: 1fr;
            }

            .word-text {
                font-size: 36px;
            }

            .word-meaning {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="doraemon-face"></div>
            <h1 class="title">🎒 KET 单词学习 🚪</h1>
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-icon">⭐</span>
                    <span class="stat-value" id="points">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🔥</span>
                    <span class="stat-value" id="streak">0</span>天
                </div>
            </div>
        </div>

        <!-- Check-in Button -->
        <div class="checkin-container">
            <button class="checkin-btn" id="checkinBtn">📅 今日打卡 +50积分</button>
        </div>

        <!-- Home Page: Unit List -->
        <div id="homePage">
            <h2 style="text-align: center; color: #0099CC; margin-bottom: 20px;">选择学习单元</h2>
            <div class="units-grid" id="unitsGrid"></div>
        </div>

        <!-- Level Selection Page -->
        <div id="levelSelectPage" class="hidden">
            <button class="back-btn" onclick="goHome()">← 返回首页</button>
            <h2 style="text-align: center; color: #0099CC; margin-bottom: 20px;" id="levelSelectTitle"></h2>
            <div class="level-grid" id="levelGrid"></div>
        </div>

        <!-- Study Mode -->
        <div id="studyPage" class="hidden">
            <button class="back-btn" onclick="goBackToLevelSelect()">← 返回关卡</button>
            <div class="progress" id="studyProgress"></div>
            <div class="word-card">
                <div class="word-text" id="wordText"></div>
                <button class="pronounce-btn" onclick="speakCurrentWord()">🔊 发音</button>
                <div class="word-details">
                    <div class="word-pos" id="wordPos"></div>
                    <div class="word-phonetic" id="wordPhonetic"></div>
                    <div class="word-meaning" id="wordMeaning"></div>
                    <div class="word-example" id="wordExample"></div>
                </div>
                <div class="navigation">
                    <button class="nav-btn prev-btn" id="prevBtn" onclick="prevWord()">← 上一个</button>
                    <button class="nav-btn next-btn" id="nextBtn" onclick="nextWord()">下一个 →</button>
                </div>
            </div>
        </div>

        <!-- Quiz Mode -->
        <div id="quizPage" class="hidden">
            <button class="back-btn" onclick="goBackToLevelSelect()">← 返回关卡</button>
            <div class="quiz-container">
                <div class="quiz-progress" id="quizProgress"></div>
                <div class="quiz-question" id="quizQuestion"></div>
                <div class="quiz-options" id="quizOptions"></div>
                <div class="feedback hidden" id="feedback"></div>
            </div>
        </div>

        <!-- Completion Screen -->
        <div id="completionPage" class="hidden">
            <div class="completion-screen">
                <div class="completion-title">🎉 恭喜通关！</div>
                <div class="completion-stars">⭐⭐⭐</div>
                <div class="completion-message" id="completionMessage"></div>
                <button class="completion-btn" onclick="goBackToLevelSelect()">继续学习</button>
            </div>
        </div>
    </div>

    <script>

        // User Data
        let userData = {
            points: 1000,
            streak: 0,
            lastCheckIn: null,
            unlockedLevels: ["unit1-pretest-1"],
            completedLevels: [],
            currentLevel: null
        };

        // Current state
        let currentUnitSource = null;
        let currentLevelId = null;
        let studyMode = null;
        let currentWordIndex = 0;
        let quizGame = null;

        // Initialize
        function init() {
            loadUserData();
            updateStats();
            renderUnits();
            setupCheckIn();
        }

        // LocalStorage
        function loadUserData() {
            const saved = localStorage.getItem('ketUserData');
            if (saved) {
                userData = { ...userData, ...JSON.parse(saved) };
            }
        }

        function saveUserData() {
            localStorage.setItem('ketUserData', JSON.stringify(userData));
            updateStats();
        }

        function updateStats() {
            document.getElementById('points').textContent = userData.points;
            document.getElementById('streak').textContent = userData.streak;
        }

        // Check In
        function setupCheckIn() {
            const btn = document.getElementById('checkinBtn');
            btn.addEventListener('click', dailyCheckIn);
            updateCheckInButton();
        }

        function getTodayString() {
            const today = new Date();
            return today.toISOString().split('T')[0];
        }

        function getYesterdayString() {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            return yesterday.toISOString().split('T')[0];
        }

        function updateCheckInButton() {
            const btn = document.getElementById('checkinBtn');
            const today = getTodayString();
            if (userData.lastCheckIn === today) {
                btn.disabled = true;
                btn.textContent = '✅ 今日已打卡';
            } else {
                btn.disabled = false;
                btn.textContent = '📅 今日打卡 +50积分';
            }
        }

        function dailyCheckIn() {
            const today = getTodayString();

            if (userData.lastCheckIn === today) {
                showToast('今日已打卡！');
                return;
            }

            const yesterday = getYesterdayString();
            if (userData.lastCheckIn === yesterday) {
                userData.streak++;
            } else if (userData.lastCheckIn) {
                // Streak broken
                userData.points = Math.max(0, userData.points - 50);
                userData.streak = 1;
            } else {
                userData.streak = 1;
            }

            const baseReward = 50;
            const streakBonus = Math.floor(userData.streak / 7) * 20;
            userData.points += baseReward + streakBonus;

            userData.lastCheckIn = today;
            saveUserData();
            updateCheckInButton();

            showToast(`打卡成功！+${baseReward}积分 (连续${userData.streak}天)`);
        }

        // Render Units
        function renderUnits() {
            const grid = document.getElementById('unitsGrid');
            grid.innerHTML = '';

            const units = new Set();
            for (const key of Object.keys(levelData)) {
                const match = key.match(/unit([0-9]+)-(.+)/);
                if (match) {
                    units.add(parseInt(match[1]));
                }
            }

            const sortedUnits = Array.from(units).sort((a, b) => a - b);

            sortedUnits.forEach(unitNum => {
                const card = document.createElement('div');
                card.className = 'unit-card';
                card.innerHTML = `
                    <div class="unit-title">Unit ${unitNum}</div>
                    <div class="unit-buttons">
                        <button class="unit-btn pretest-btn" onclick="selectSource('unit${unitNum}-pretest', '前测')">前测</button>
                        <button class="unit-btn wordlist-btn" onclick="selectSource('unit${unitNum}-wordlist', '词汇表')">词汇表</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Select Unit Source
        function selectSource(unitSource, sourceName) {
            currentUnitSource = unitSource;
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('levelSelectPage').classList.remove('hidden');
            document.getElementById('levelSelectTitle').textContent =
                levelData[unitSource]?.name || sourceName;
            renderLevels();
        }

        // Render Levels
        function renderLevels() {
            const grid = document.getElementById('levelGrid');
            grid.innerHTML = '';

            const data = levelData[currentUnitSource];
            if (!data || !data.levels) {
                grid.innerHTML = '<p style="text-align:center;grid-column:1/-1;">暂无关卡</p>';
                return;
            }

            data.levels.forEach((level, index) => {
                const isUnlocked = userData.unlockedLevels.includes(level.id);
                const isCompleted = userData.completedLevels.includes(level.id);

                const card = document.createElement('div');
                card.className = `level-card ${isCompleted ? 'completed' : (isUnlocked ? 'unlocked' : 'locked')}`;

                let statusText = '🔒 未解锁';
                if (isCompleted) statusText = '✅ 已完成';
                else if (isUnlocked) statusText = '🔓 已解锁';

                card.innerHTML = `
                    <div class="level-number">关卡 ${index + 1}/${data.levels.length}</div>
                    <div class="level-status">${statusText}</div>
                    <div class="level-actions">
                        <button class="level-btn study-btn" ${!isUnlocked ? 'disabled' : ''} onclick="startStudy('${level.id}')">学习</button>
                        <button class="level-btn quiz-btn" ${!isUnlocked ? 'disabled' : ''} onclick="startQuiz('${level.id}')">通关</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Navigation
        function goHome() {
            currentUnitSource = null;
            document.getElementById('homePage').classList.remove('hidden');
            document.getElementById('levelSelectPage').classList.add('hidden');
            document.getElementById('studyPage').classList.add('hidden');
            document.getElementById('quizPage').classList.add('hidden');
            document.getElementById('completionPage').classList.add('hidden');
        }

        function goBackToLevelSelect() {
            document.getElementById('levelSelectPage').classList.remove('hidden');
            document.getElementById('studyPage').classList.add('hidden');
            document.getElementById('quizPage').classList.add('hidden');
            document.getElementById('completionPage').classList.add('hidden');
            renderLevels();
        }

        // Study Mode
        function startStudy(levelId) {
            currentLevelId = levelId;
            const levelInfo = levelIdMap[levelId];
            if (!levelInfo) return;

            studyMode = {
                words: levelInfo.words,
                currentIndex: 0
            };

            currentWordIndex = 0;
            document.getElementById('levelSelectPage').classList.add('hidden');
            document.getElementById('studyPage').classList.remove('hidden');
            renderStudyWord();
        }

        function renderStudyWord() {
            const word = studyMode.words[currentWordIndex];
            const total = studyMode.words.length;

            document.getElementById('studyProgress').textContent = `${currentWordIndex + 1}/${total}`;
            document.getElementById('wordText').textContent = word['单词'];
            document.getElementById('wordPos').textContent = word['词性'] || '';
            document.getElementById('wordPhonetic').textContent = word['音标'] || '';
            document.getElementById('wordMeaning').textContent = word['中文含义'] || '';

            const example = word['例句'];
            document.getElementById('wordExample').textContent = example && example !== '无' ? example : '';

            document.getElementById('prevBtn').disabled = currentWordIndex === 0;
            document.getElementById('nextBtn').textContent = currentWordIndex === total - 1 ? '完成' : '下一个 →';
        }

        function prevWord() {
            if (currentWordIndex > 0) {
                currentWordIndex--;
                renderStudyWord();
            }
        }

        function nextWord() {
            if (currentWordIndex < studyMode.words.length - 1) {
                currentWordIndex++;
                renderStudyWord();
            } else {
                showToast('学习完成！');
                goBackToLevelSelect();
            }
        }

        function speakCurrentWord() {
            const word = studyMode.words[currentWordIndex];
            speakWord(word['单词']);
        }

        // Quiz Mode
        class QuizGame {
            constructor(words) {
                this.words = this.shuffleArray([...words]);
                this.currentQuestion = 0;
                this.correctCount = 0;
                this.wrongCount = 0;
                this.currentQuestionData = null;
            }

            shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            generateQuestion() {
                const word = this.words[this.currentQuestion];
                const type = Math.random() > 0.5 ? 'word-to-chinese' : 'chinese-to-word';

                const otherWords = this.words.filter(w => w['单词'] !== word['单词']);
                const distractors = this.shuffleArray(otherWords).slice(0, 3);

                const question = {
                    type,
                    question: type === 'word-to-chinese' ? word['单词'] : word['中文含义'],
                    correctAnswer: type === 'word-to-chinese' ? word['中文含义'] : word['单词'],
                    options: this.shuffleArray([word, ...distractors]).map(w =>
                        type === 'word-to-chinese' ? w['中文含义'] : w['单词']
                    ),
                    word
                };

                this.currentQuestionData = question;
                return question;
            }

            checkAnswer(selected) {
                const question = this.currentQuestionData;
                if (!question) {
                    return { status: 'error', message: 'No question data' };
                }

                if (selected === question.correctAnswer) {
                    this.currentQuestion++;
                    this.correctCount++;
                    this.currentQuestionData = null;

                    if (this.currentQuestion >= this.words.length) {
                        return { status: 'complete', score: this.correctCount };
                    }
                    return { status: 'correct' };
                } else {
                    this.wrongCount++;
                    this.currentQuestion++;
                    this.currentQuestionData = null;

                    if (this.currentQuestion >= this.words.length) {
                        return { status: 'complete', score: this.correctCount };
                    }
                    return { status: 'wrong', correct: question.correctAnswer, word: question.word };
                }
            }

            getProgress() {
                return `${this.currentQuestion}/${this.words.length}`;
            }

            isComplete() {
                return this.currentQuestion >= this.words.length;
            }
        }

        function startQuiz(levelId) {
            currentLevelId = levelId;
            const levelInfo = levelIdMap[levelId];
            if (!levelInfo) return;

            quizGame = new QuizGame(levelInfo.words);

            document.getElementById('levelSelectPage').classList.add('hidden');
            document.getElementById('quizPage').classList.remove('hidden');
            document.getElementById('feedback').classList.add('hidden');
            renderQuizQuestion();
        }

        function renderQuizQuestion() {
            if (quizGame.isComplete()) {
                showCompletion();
                return;
            }

            const question = quizGame.generateQuestion();
            document.getElementById('quizProgress').textContent = `题目 ${quizGame.getProgress()}`;
            document.getElementById('quizQuestion').textContent = question.question;
            document.getElementById('feedback').classList.add('hidden');

            const optionsContainer = document.getElementById('quizOptions');
            optionsContainer.innerHTML = '';

            question.options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option';
                btn.textContent = option;
                btn.onclick = () => handleQuizAnswer(option);
                optionsContainer.appendChild(btn);
            });
        }

        function handleQuizAnswer(selected) {
            const result = quizGame.checkAnswer(selected);
            const feedback = document.getElementById('feedback');
            const optionsContainer = document.getElementById('quizOptions');

            if (result.status === 'correct') {
                showToast('正确！✨');
                renderQuizQuestion();
            } else if (result.status === 'wrong') {
                const options = optionsContainer.querySelectorAll('.quiz-option');
                options.forEach(opt => {
                    opt.disabled = true;
                    opt.style.opacity = '0.5';
                    opt.style.cursor = 'not-allowed';
                });

                feedback.className = 'feedback wrong';
                feedback.innerHTML = `
                    <div>❌ 答错了！</div>
                    <div style="margin-top:10px;">正确答案：${result.correct}</div>
                    <div style="margin-top:10px;">${result.word['单词']} - ${result.word['中文含义']}</div>
                    <button class="next-btn" onclick="nextQuestion()" style="margin-top:15px;padding:10px 30px;background:#0099CC;color:white;border:none;border-radius:20px;cursor:pointer;font-size:16px;">继续</button>
                `;
                feedback.classList.remove('hidden');
            } else if (result.status === 'complete') {
                showCompletion();
            }
        }

        function nextQuestion() {
            const feedback = document.getElementById('feedback');
            feedback.classList.add('hidden');
            renderQuizQuestion();
        }

        function showCompletion() {
            document.getElementById('quizPage').classList.add('hidden');
            document.getElementById('completionPage').classList.remove('hidden');

            const score = quizGame.correctCount;
            const wrong = quizGame.wrongCount;
            const total = quizGame.words.length;
            const bonus = Math.floor((score / total) * 50);

            // Award points based on score
            userData.points += bonus;

            // Update user data
            if (!userData.completedLevels.includes(currentLevelId)) {
                userData.completedLevels.push(currentLevelId);

                // Only unlock next level if all answers are correct
                if (score === total) {
                    unlockNextLevel(currentLevelId);
                }
                saveUserData();
            }

            document.getElementById('completionMessage').textContent =
                `答对 ${score}/${total} 题，答错 ${wrong}/${total} 题，获得 ${bonus} 积分！`;

            // Only show fireworks if all correct
            if (score === total) {
                createFireworks();
            }
        }

        function unlockNextLevel(levelId) {
            const levelInfo = levelIdMap[levelId];
            if (!levelInfo) return;

            const unitSource = `${levelInfo.unit}-${levelInfo.source}`;
            const currentIndex = levelInfo.index;

            const data = levelData[unitSource];
            if (data && data.levels) {
                const totalLevels = data.levels.length;
                if (currentIndex < totalLevels) {
                    const nextLevelId = `${unitSource}-${currentIndex + 1}`;
                    if (!userData.unlockedLevels.includes(nextLevelId)) {
                        userData.unlockedLevels.push(nextLevelId);
                    }
                }
            }

            // Award points
            const bonus = 20;
            userData.points += bonus;
        }

        // Speech
        function speakWord(word) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                speechSynthesis.speak(utterance);
            } else {
                showToast('您的浏览器不支持语音播放');
            }
        }

        // Toast
        function showToast(message) {
            const existingToast = document.querySelector('.toast');
            if (existingToast) {
                existingToast.remove();
            }

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Fireworks
        function createFireworks() {
            const colors = ['#FF6B6B', '#FFD700', '#98D8AA', '#0099CC', '#FF8888'];

            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const firework = document.createElement('div');
                    firework.className = 'firework';
                    firework.style.left = Math.random() * window.innerWidth + 'px';
                    firework.style.top = Math.random() * window.innerHeight + 'px';
                    firework.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    document.body.appendChild(firework);

                    setTimeout(() => firework.remove(), 1000);
                }, i * 100);
            }
        }

        // Initialize on load
        window.onload = init;
    </script>
</body>
</html>
